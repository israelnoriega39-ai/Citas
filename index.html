<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F4C81">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Consultorio — Citas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
  onSnapshot, query, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const _log = [];
function dbg(msg) { _log.push(msg); }
window.clearDbg = () => {};

try {
  const firebaseConfig = {
    apiKey:            "AIzaSyDxXzUBMorQd9opF7tszT8mIstBIcuEhCs",
    authDomain:        "citas-consultorio-f787f.firebaseapp.com",
    projectId:         "citas-consultorio-f787f",
    storageBucket:     "citas-consultorio-f787f.firebasestorage.app",
    messagingSenderId: "727579241809",
    appId:             "1:727579241809:web:0ebf5d971d57fb0611f770"
  };

  const app  = initializeApp(firebaseConfig);

  const auth = getAuth(app);

  const db = getFirestore(app);

  window._FB = { auth, db, collection, doc, addDoc, updateDoc, deleteDoc,
                 onSnapshot, query, serverTimestamp, signInWithEmailAndPassword, signOut };

  onAuthStateChanged(auth, user => {
    if (user) {
      dbg('✔ Usuario autenticado: ' + user.email, '#50fa7b');
      document.getElementById('screen-login').style.display = 'none';
      document.getElementById('screen-app').style.display   = 'flex';
      document.getElementById('user-email').textContent = user.email;
      window.startApp();
    } else {
          document.getElementById('screen-login').style.display = 'flex';
      document.getElementById('screen-app').style.display   = 'none';
      if (window._unsubscribeCitas) window._unsubscribeCitas();
    }
  });

} catch(e) {
  dbg('❌ ERROR INIT: ' + e.message, '#ff5555');
}
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Paleta: azul pizarrón profundo + lavanda suave + menta fresca */
  --ink:        #0D1B2A;
  --navy:       #0F4C81;
  --navy-mid:   #1A6BB5;
  --navy-light: #E8F2FF;
  --lavender:   #7C6FF7;
  --lavender-lt:#EEF0FF;
  --mint:       #0BAB8C;
  --mint-lt:    #D6F5EE;
  --amber:      #E07B1A;
  --amber-lt:   #FEF0DC;
  --rose:       #E03E52;
  --rose-lt:    #FDE8EB;
  --surface:    #F6F8FC;
  --card:       #FFFFFF;
  --border:     #E4EAF2;
  --txt-main:   #0D1B2A;
  --txt-mid:    #4A5568;
  --txt-soft:   #8B98A8;
  --shadow-xs:  0 1px 3px rgba(15,76,129,.08);
  --shadow-sm:  0 2px 10px rgba(15,76,129,.10);
  --shadow-md:  0 6px 24px rgba(15,76,129,.13);
  --r:  16px;
  --r-sm: 10px;
}

html, body { height: 100%; font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
             background: var(--surface); color: var(--txt-main); -webkit-font-smoothing: antialiased; }

/* ═══════════════════════════
   SCREEN SYSTEM
═══════════════════════════ */
#screen-login { display: flex; flex-direction: column; align-items: center;
                justify-content: center; min-height: 100vh;
                background: linear-gradient(160deg, #0D1B2A 0%, #0F4C81 60%, #1A6BB5 100%);
                padding: 32px 24px; }
#screen-app   { display: none; flex-direction: column; min-height: 100vh; }

/* ═══════════════════════════
   LOGIN
═══════════════════════════ */
.login-card {
  background: rgba(255,255,255,.07);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 24px;
  padding: 36px 28px;
  width: 100%; max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,.35);
}
.login-logo {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-bottom: 8px;
}
.login-logo-icon {
  width: 52px; height: 52px;
  background: var(--lavender);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.login-title { font-size: 26px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 4px; }
.login-sub   { font-size: 13px; color: rgba(255,255,255,.55); text-align: center; margin-bottom: 28px; }

.login-field { margin-bottom: 14px; }
.login-field label { display: block; font-size: 12px; font-weight: 600;
                     color: rgba(255,255,255,.6); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.login-field input {
  width: 100%; background: rgba(255,255,255,.1); border: 1.5px solid rgba(255,255,255,.18);
  border-radius: var(--r-sm); padding: 13px 14px; font-size: 15px;
  font-family: inherit; color: #fff; outline: none; transition: border-color .15s;
}
.login-field input::placeholder { color: rgba(255,255,255,.35); }
.login-field input:focus { border-color: var(--lavender); box-shadow: 0 0 0 3px rgba(124,111,247,.25); }

.btn-login {
  width: 100%; background: var(--lavender); color: #fff; border: none;
  border-radius: var(--r-sm); padding: 14px; font-size: 15px; font-weight: 700;
  font-family: inherit; cursor: pointer; margin-top: 6px; transition: opacity .15s, transform .1s;
  letter-spacing: -.1px;
}
.btn-login:hover   { opacity: .9; }
.btn-login:active  { transform: scale(.98); }
.btn-login:disabled { opacity: .55; cursor: default; }

.login-error {
  background: rgba(224,62,82,.2); border: 1px solid rgba(224,62,82,.4);
  color: #ffb3bc; border-radius: var(--r-sm); padding: 10px 14px;
  font-size: 13px; margin-top: 12px; display: none; text-align: center;
}

/* ═══════════════════════════
   HEADER
═══════════════════════════ */
.header {
  background: linear-gradient(135deg, #0D1B2A 0%, #0F4C81 100%);
  padding: 20px 18px 0;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow-md);
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.header-brand { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 40px; height: 40px; background: var(--lavender);
  border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name  { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.4px; }
.brand-user  { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 1px; }

.header-actions { display: flex; align-items: center; gap: 8px; }
.btn-logout {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.7); border-radius: 8px; padding: 7px 10px;
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.btn-logout:hover { background: rgba(255,255,255,.18); }
.btn-new {
  background: var(--lavender); border: none; color: #fff;
  border-radius: 10px; padding: 9px 14px; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  font-family: inherit; transition: opacity .15s;
}
.btn-new:hover { opacity: .9; }

/* ── Date nav ── */
.date-strip { padding-bottom: 14px; text-align: center; }
.date-main { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.75); }

/* ═══════════════════════════
   STATS STRIP
═══════════════════════════ */
.stats-wrap {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0 4px; position: sticky; top: 0; z-index: 90;
}
.stats-strip { display: flex; overflow-x: auto; scrollbar-width: none; gap: 0; }
.stats-strip::-webkit-scrollbar { display: none; }
.stat-pill {
  flex: 1; min-width: 80px; text-align: center;
  padding: 12px 8px; position: relative;
}
.stat-pill + .stat-pill::before {
  content: ''; position: absolute; left: 0; top: 25%; bottom: 25%;
  width: 1px; background: var(--border);
}
.stat-n  { font-size: 24px; font-weight: 800; line-height: 1; letter-spacing: -.5px; }
.stat-l  { font-size: 10px; font-weight: 600; color: var(--txt-soft);
           text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; }
.c-navy    { color: var(--navy); }
.c-amber   { color: var(--amber); }
.c-mint    { color: var(--mint); }
.c-rose    { color: var(--rose); }
.c-lavender{ color: var(--lavender); }

/* ═══════════════════════════
   OFFLINE BANNER
═══════════════════════════ */
.offline-banner {
  background: var(--amber); color: #fff; text-align: center;
  padding: 7px 16px; font-size: 12px; font-weight: 600;
  display: none; align-items: center; justify-content: center; gap: 6px;
}
.offline-banner.show { display: flex; }

/* ═══════════════════════════
   CITA LIST
═══════════════════════════ */
.main { padding: 10px; flex: 1; }

.section-label {
  font-size: 12px; font-weight: 700; color: var(--txt-soft);
  text-transform: uppercase; letter-spacing: .5px;
  margin: 4px 0 8px 2px; display: flex; align-items: center; gap: 4px;
}
.notif-banner {
  background: var(--lavender-lt); border: 1px solid var(--lavender);
  border-radius: var(--r-sm); padding: 10px 14px; margin: 10px;
  font-size: 13px; color: var(--lavender); font-weight: 600;
  display: flex; align-items: center; gap: 8px; cursor: pointer;
}

/* Empty */
.empty { text-align: center; padding: 52px 24px; color: var(--txt-soft); }
.empty-icon { font-size: 48px; margin-bottom: 14px; }
.empty h3 { font-size: 17px; font-weight: 700; color: var(--txt-mid); margin-bottom: 6px; }
.empty p  { font-size: 13px; }

/* Card */
.cita-card {
  background: var(--card); border-radius: var(--r);
  border: 1px solid var(--border); box-shadow: var(--shadow-xs);
  margin-bottom: 8px; display: flex; overflow: hidden;
  transition: box-shadow .2s; position: relative;
  width: 100%;
}
.cita-card:hover { box-shadow: var(--shadow-sm); }

/* Borde estado — firma de diseño */
.c-strip { width: 5px; flex-shrink: 0; transition: background .3s; }
.pendiente  .c-strip { background: var(--amber); }
.confirmado .c-strip { background: var(--mint); }
.cancelado  .c-strip { background: var(--rose); }

.c-body { flex: 1; padding: 14px 12px 14px 14px; min-width: 0; }

.c-row1 { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
.c-name {
  font-size: 17px; font-weight: 700; color: var(--txt-main);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.c-time {
  font-size: 13px; font-weight: 700; color: var(--navy);
  background: var(--navy-light); padding: 3px 9px; border-radius: 20px;
  white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums;
}
.c-phone {
  font-size: 13px; color: var(--txt-soft); margin-bottom: 5px;
  display: flex; align-items: center; gap: 4px;
}
.c-badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
  letter-spacing: .5px; margin-bottom: 5px;
}
.pendiente  .c-badge { background: var(--amber-lt); color: var(--amber); }
.confirmado .c-badge { background: var(--mint-lt);  color: var(--mint); }
.cancelado  .c-badge { background: var(--rose-lt);  color: var(--rose); }

.c-notes {
  font-size: 13px; color: var(--txt-mid); background: var(--surface);
  border-radius: 8px; padding: 6px 9px; margin-top: 4px; line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* Actions col */
.c-actions {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; padding: 10px 10px 10px 6px;
}
.st-btn {
  width: 34px; height: 34px; border-radius: 50%; border: 2px solid transparent;
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: transform .12s, border-color .15s, background .15s;
  opacity: .38;
}
.st-btn:hover  { transform: scale(1.15); opacity: 1; }
.st-btn.active { opacity: 1; }
.pendiente  .st-btn.pend { border-color: var(--amber); background: var(--amber-lt); }
.confirmado .st-btn.conf { border-color: var(--mint);  background: var(--mint-lt); }
.cancelado  .st-btn.canc { border-color: var(--rose);  background: var(--rose-lt); }

.act-sep { width: 22px; height: 1px; background: var(--border); margin: 2px 0; }

.btn-wa {
  width: 34px; height: 34px; background: #25D366; border: none;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; text-decoration: none;
  box-shadow: 0 2px 8px rgba(37,211,102,.32); transition: transform .13s;
}
.btn-wa:hover { transform: scale(1.12); }

.btn-edit {
  width: 30px; height: 30px; background: var(--lavender-lt); border: none;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform .13s; font-size: 13px;
}
.btn-edit:hover { transform: scale(1.12); background: var(--lavender); }

.btn-del {
  width: 30px; height: 30px; background: var(--rose-lt); border: none;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform .13s; font-size: 13px;
}
.btn-del:hover { transform: scale(1.12); background: var(--rose-lt); }

/* ═══════════════════════════
   MODAL (sheet)
═══════════════════════════ */
.overlay {
  position: fixed; inset: 0; background: rgba(13,27,42,.6);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
  backdrop-filter: blur(3px);
}
.overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  background: var(--card); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 560px;
  transform: translateY(40px); transition: transform .32s cubic-bezier(.22,1,.36,1);
  max-height: 93vh; overflow-y: auto; padding-bottom: env(safe-area-inset-bottom);
}
.overlay.open .sheet { transform: translateY(0); }

.sh-handle { width: 38px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.sh-head   { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; }
.sh-title  { font-size: 18px; font-weight: 800; }
.sh-close  {
  width: 34px; height: 34px; background: var(--surface); border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; color: var(--txt-mid); font-family: inherit;
  transition: background .15s;
}
.sh-close:hover { background: var(--border); }
.sh-body { padding: 20px; }

.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 11px; font-weight: 700; color: var(--txt-soft);
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: .6px;
}
.field input, .field textarea, .field select {
  width: 100%; border: 1.5px solid var(--border); border-radius: var(--r-sm);
  padding: 12px 14px; font-size: 15px; font-family: inherit;
  color: var(--txt-main); background: var(--card); outline: none;
  transition: border-color .15s; -webkit-appearance: none;
}
.field input:focus, .field textarea:focus { border-color: var(--lavender); box-shadow: 0 0 0 3px rgba(124,111,247,.13); }
.field textarea { resize: none; height: 80px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn-save {
  width: 100%; background: linear-gradient(135deg, var(--navy) 0%, var(--lavender) 100%);
  color: #fff; border: none; border-radius: var(--r-sm); padding: 15px;
  font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit;
  transition: opacity .15s, transform .1s; margin-top: 4px; letter-spacing: -.2px;
}
.btn-save:hover  { opacity: .92; }
.btn-save:active { transform: scale(.98); }

/* ═══════════════════════════
   CONFIRM DELETE MODAL
═══════════════════════════ */
.confirm-overlay {
  position: fixed; inset: 0; background: rgba(13,27,42,.7);
  z-index: 300; display: flex; align-items: center; justify-content: center;
  padding: 24px; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.confirm-overlay.open { opacity: 1; pointer-events: all; }
.confirm-box {
  background: var(--card); border-radius: 20px; padding: 28px 24px;
  max-width: 320px; width: 100%; text-align: center;
  transform: scale(.95); transition: transform .2s;
  box-shadow: var(--shadow-md);
}
.confirm-overlay.open .confirm-box { transform: scale(1); }
.confirm-icon { font-size: 40px; margin-bottom: 12px; }
.confirm-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.confirm-msg { font-size: 14px; color: var(--txt-mid); margin-bottom: 22px; line-height: 1.5; }
.confirm-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-cancel-c {
  background: var(--surface); border: 1.5px solid var(--border); color: var(--txt-mid);
  border-radius: var(--r-sm); padding: 12px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background .15s;
}
.btn-cancel-c:hover { background: var(--border); }
.btn-delete-c {
  background: var(--rose); color: #fff; border: none;
  border-radius: var(--r-sm); padding: 12px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: opacity .15s;
}
.btn-delete-c:hover { opacity: .88; }

/* ═══════════════════════════
   TOAST
═══════════════════════════ */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--ink); color: #fff; padding: 11px 22px;
  border-radius: 30px; font-size: 13px; font-weight: 600;
  opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
  white-space: nowrap; z-index: 400; box-shadow: var(--shadow-md);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════
   LOADER
═══════════════════════════ */
.loader {
  display: flex; align-items: center; justify-content: center;
  padding: 48px; color: var(--txt-soft); font-size: 14px; gap: 10px;
}
.spin {
  width: 20px; height: 20px; border: 2.5px solid var(--border);
  border-top-color: var(--lavender); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (prefers-reduced-motion: reduce) {
  .sheet, .overlay, .confirm-overlay, .confirm-box, .toast { transition: none; }
  .spin { animation: none; }
}
</style>
</head>
<body>

<!-- ══════════════ LOGIN SCREEN ══════════════ -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <path d="M13 3v9m0 0v9m0-9h9m-9 0H4" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <div class="login-title">Consultorio</div>
    <div class="login-sub">Acceso seguro al sistema de citas</div>

    <div class="login-field">
      <label>Correo electrónico</label>
      <input type="email" id="l-email" placeholder="doctor@ejemplo.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ══════════════ APP SCREEN ══════════════ -->
<div id="screen-app">

  <!-- OFFLINE BANNER -->
  <div class="offline-banner" id="offline-banner">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="white" stroke-width="1.5"/><path d="M7 4v3.5L9 9" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
    Sin conexión — mostrando datos guardados
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="header-brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 2v7m0 0v7m0-7h7m-7 0H3" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Consultorio</div>
          <div class="brand-user" id="user-email"></div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-logout" onclick="doLogout()">Salir</button>
        <button class="btn-new" onclick="openModal()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
          Nueva cita
        </button>
      </div>
    </div>

    <div class="date-strip">
      <div class="date-main" id="date-display"></div>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-wrap">
    <div class="stats-strip">
      <div class="stat-pill">
        <div class="stat-n c-navy"    id="s-dia">0</div>
        <div class="stat-l">Citas hoy</div>
      </div>
      <div class="stat-pill">
        <div class="stat-n c-amber"   id="s-pend">0</div>
        <div class="stat-l">Pendiente</div>
      </div>
      <div class="stat-pill">
        <div class="stat-n c-mint"    id="s-conf">0</div>
        <div class="stat-l">Confirmado</div>
      </div>
      <div class="stat-pill">
        <div class="stat-n c-rose"    id="s-canc">0</div>
        <div class="stat-l">Cancelado</div>
      </div>
      <div class="stat-pill">
        <div class="stat-n c-lavender" id="s-total">0</div>
        <div class="stat-l">Total citas</div>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <main class="main" id="list-root"></main>
</div>

<!-- MODAL NUEVA / EDITAR CITA -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-head">
      <h2 class="sh-title" id="modal-title">Nueva cita</h2>
      <button class="sh-close" onclick="closeModal()">✕</button>
    </div>
    <div class="sh-body">
      <input type="hidden" id="f-id">
      <div class="field">
        <label>Nombre del paciente</label>
        <input type="text" id="f-nombre" placeholder="Ej. María González" autocomplete="off">
      </div>
      <div class="field">
        <label>Teléfono (WhatsApp) — código país incluido</label>
        <input type="tel" id="f-tel" placeholder="5218001234567" autocomplete="off">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Fecha</label>
          <input type="date" id="f-fecha">
        </div>
        <div class="field">
          <label>Hora</label>
          <input type="time" id="f-hora">
        </div>
      </div>
      <div class="field">
        <label>Notas</label>
        <textarea id="f-notas" placeholder="Motivo de consulta, indicaciones…"></textarea>
      </div>
      <button class="btn-save" onclick="saveCita()">Guardar cita</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">Eliminar cita</div>
    <div class="confirm-msg" id="confirm-msg">¿Seguro que quieres eliminar esta cita? Esta acción no se puede deshacer.</div>
    <div class="confirm-btns">
      <button class="btn-cancel-c" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-delete-c" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto',
               'septiembre','octubre','noviembre','diciembre'];

let currentDate = new Date();
let allCitas    = [];  // cache local de todas las citas
let deleteTarget = null;

function toISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function isToday(d) { return toISO(d) === toISO(new Date()); }

function fmtDate(d) {
  return `${DIAS[d.getDay()]}, ${d.getDate()} de ${MESES[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtHora(h) {
  if (!h) return '';
  const [hr, min] = h.split(':');
  const n = parseInt(hr); const ampm = n < 12 ? 'am' : 'pm';
  return `${n % 12 || 12}:${min} ${ampm}`;
}
function fmtFechaWA(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${DIAS[dt.getDay()]} ${dt.getDate()} de ${MESES[dt.getMonth()]}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function waUrl(c) {
  const msg = `Hola ${c.nombre}, le recordamos su cita médica el *${fmtFechaWA(c.fecha)}* a las *${fmtHora(c.hora)}*. Por favor confirme su asistencia. ¡Gracias!`;
  const num = (c.telefono||'').replace(/\D/g,'');
  return `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
}

// ── Toast ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Offline detection ──
function updateOffline() {
  document.getElementById('offline-banner').classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online',  updateOffline);
window.addEventListener('offline', updateOffline);

// ═══════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════
async function doLogin() {
  const { auth, signInWithEmailAndPassword } = window._FB;
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const btn   = document.getElementById('btn-login');
  const err   = document.getElementById('login-error');

  if (!email || !pass) { showLoginErr('Ingresa correo y contraseña.'); return; }
  btn.disabled = true; btn.textContent = 'Entrando…';
  err.style.display = 'none';

  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    const msgs = {
      'auth/invalid-credential':    'Correo o contraseña incorrectos.',
      'auth/user-not-found':        'Usuario no encontrado.',
      'auth/wrong-password':        'Contraseña incorrecta.',
      'auth/too-many-requests':     'Demasiados intentos. Espera un momento.',
      'auth/network-request-failed':'Sin conexión. Verifica tu red.',
    };
    showLoginErr(msgs[e.code] || 'Error al iniciar sesión.');
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}
function showLoginErr(msg) {
  const e = document.getElementById('login-error');
  e.textContent = msg; e.style.display = 'block';
}
function doLogout() {
  window._FB.signOut(window._FB.auth);
  allCitas = [];
}

// ═══════════════════════════════════════════
//  APP INIT — llamado cuando el usuario se autentica
// ═══════════════════════════════════════════
window.startApp = function() {
  updateOffline();
  renderDate();
  subscribeToFirestore();
  requestNotificationPermission();
};

// ── NOTIFICACIONES ──
function requestNotificationPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function checkMorningNotification() {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;

  const now   = new Date();
  const hour  = now.getHours();
  const todayISO = toISO(now);
  const key   = 'notif_shown_' + todayISO;

  // Solo mostrar si es después de las 8am y no se ha mostrado hoy
  if (hour < 8) return;
  if (localStorage.getItem(key)) return;

  const citasHoy      = allCitas.filter(c => c.fecha === todayISO);
  const confirmadas   = citasHoy.filter(c => c.estado === 'confirmado').length;
  const pendientes    = citasHoy.filter(c => c.estado === 'pendiente').length;
  const total         = citasHoy.length;

  if (total === 0) return;

  localStorage.setItem(key, '1');

  const body = total === 0
    ? 'No tienes citas programadas para hoy.'
    : `Tienes ${confirmadas} cita${confirmadas!==1?'s':''} confirmada${confirmadas!==1?'s':''} y ${pendientes} pendiente${pendientes!==1?'s':''} de confirmar.`;

  try {
    new Notification('🩺 Buenos días — Resumen del día', {
      body,
      icon: 'https://israelnoriega39-ai.github.io/citas-consultorio/icon.png',
      badge: 'https://israelnoriega39-ai.github.io/citas-consultorio/icon.png',
      tag: 'morning-summary'
    });
  } catch(e) {}
}

// ═══════════════════════════════════════════
//  FIRESTORE REALTIME SUBSCRIPTION
// ═══════════════════════════════════════════
function subscribeToFirestore() {
  const { db, collection, onSnapshot, query } = window._FB;
  const q = query(collection(db, 'citas'));

  // Mostrar loader mientras carga
  document.getElementById('list-root').innerHTML =
    `<div class="loader"><div class="spin"></div> Cargando citas…</div>`;

  window._unsubscribeCitas = onSnapshot(q, snapshot => {
    allCitas = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
    checkMorningNotification();
  }, err => {
    console.error(err);
    renderAll();
    checkMorningNotification();
  });
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function renderDate() {
  const today = new Date();
  document.getElementById('date-display').textContent =
    'Hoy: ' + fmtDate(today);
}

function renderAll() {
  renderStats();
  renderList();
}

function renderStats() {
  const todayISO = toISO(new Date());
  const hoy = allCitas.filter(c => c.fecha === todayISO);
  document.getElementById('s-dia').textContent   = hoy.length;
  document.getElementById('s-pend').textContent  = hoy.filter(c => c.estado === 'pendiente').length;
  document.getElementById('s-conf').textContent  = hoy.filter(c => c.estado === 'confirmado').length;
  document.getElementById('s-canc').textContent  = hoy.filter(c => c.estado === 'cancelado').length;
  document.getElementById('s-total').textContent = allCitas.length;
}

function renderList() {
  const root = document.getElementById('list-root');

  if (!allCitas.length) {
    root.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📅</div>
        <h3>Sin citas registradas</h3>
        <p>Toca "Nueva cita" para agendar una.</p>
      </div>`;
    return;
  }

  // Group by date, sorted
  const groups = {};
  allCitas.forEach(c => {
    if (!groups[c.fecha]) groups[c.fecha] = [];
    groups[c.fecha].push(c);
  });
  const sortedDates = Object.keys(groups).sort();

  const todayISO = toISO(new Date());

  let html = '';
  sortedDates.forEach(fecha => {
    const list = groups[fecha].sort((a,b) => (a.hora||'').localeCompare(b.hora||''));
    const [y,m,d] = fecha.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const isHoy = fecha === todayISO;
    const label = isHoy
      ? `<span style="background:var(--lavender);color:#fff;padding:2px 8px;border-radius:20px;font-size:10px;margin-left:6px;">HOY</span>`
      : '';
    html += `<div class="section-label" style="margin-top:18px;">${fmtDate(dt)}${label} — ${list.length} cita${list.length>1?'s':''}</div>`;
    html += list.map(cardHTML).join('');
  });

  root.innerHTML = html;
}

function estadoLabel(e) {
  return { pendiente:'Pendiente', confirmado:'Confirmado', cancelado:'Cancelado' }[e] || e;
}

function cardHTML(c) {
  const telHtml = c.telefono ? `
    <div class="c-phone">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 1h2.5l1 2.5-1.5 1A7 7 0 007.5 7l1-1.5L11 6.5V9A1 1 0 0110 10C4.5 10 1 6.5 1 2a1 1 0 011-1z" fill="#8B98A8"/></svg>
      ${esc(c.telefono)}
    </div>` : '';
  const notesHtml = c.notas ? `<div class="c-notes">${esc(c.notas)}</div>` : '';

  return `
  <div class="cita-card ${esc(c.estado)}" id="card-${esc(c.id)}">
    <div class="c-strip"></div>
    <div class="c-body">
      <div class="c-row1">
        <div class="c-name">${esc(c.nombre)}</div>
        <div class="c-time">${fmtHora(c.hora)}</div>
      </div>
      ${telHtml}
      <span class="c-badge">${estadoLabel(c.estado)}</span>
      ${notesHtml}
    </div>
    <div class="c-actions">
      <button class="st-btn pend ${c.estado==='pendiente'?'active':''}"
        onclick="setEstado('${esc(c.id)}','pendiente')" title="Pendiente">⏳</button>
      <button class="st-btn conf ${c.estado==='confirmado'?'active':''}"
        onclick="setEstado('${esc(c.id)}','confirmado')" title="Confirmado">✅</button>
      <button class="st-btn canc ${c.estado==='cancelado'?'active':''}"
        onclick="setEstado('${esc(c.id)}','cancelado')" title="Cancelado">🟥</button>
      <div class="act-sep"></div>
      <a class="btn-wa" href="${waUrl(c)}" target="_blank" rel="noopener" title="WhatsApp">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.89.52 3.66 1.44 5.17L2 22l4.98-1.4A9.95 9.95 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18a7.95 7.95 0 01-4.07-1.12l-.29-.17-3.01.85.84-2.94-.19-.3A7.95 7.95 0 014 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8zm4.41-5.77c-.24-.12-1.42-.7-1.64-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1.01-.37-1.93-1.19-.71-.64-1.2-1.42-1.34-1.66-.14-.24-.01-.37.1-.49.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.3-.74-1.78-.2-.47-.39-.41-.54-.41l-.46-.01c-.16 0-.42.06-.64.3s-.84.82-.84 2c0 1.18.86 2.32.98 2.48.12.16 1.69 2.58 4.1 3.62.57.25 1.02.4 1.37.51.58.18 1.1.16 1.51.1.46-.07 1.42-.58 1.62-1.14.2-.56.2-1.04.14-1.14-.06-.1-.22-.16-.46-.28z"/></svg>
      </a>
      <div class="act-sep"></div>
      <button class="btn-edit" onclick="editCita('${esc(c.id)}')" title="Editar">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 9.5V12h2.5l7-7L8 2.5l-7 7zm11.7-7.2a.667.667 0 000-.94l-1.53-1.53a.667.667 0 00-.94 0l-1.2 1.2 2.47 2.47 1.2-1.2z" fill="#7C6FF7"/></svg>
      </button>
      <button class="btn-del" onclick="askDelete('${esc(c.id)}','${esc(c.nombre)}')" title="Eliminar">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1.5 3.5h10M4.5 3.5V2h4v1.5M5.5 6v4M7.5 6v4M2.5 3.5l.5 8h7l.5-8" stroke="#E03E52" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
//  ACCIONES
// ═══════════════════════════════════════════
async function setEstado(id, estado) {
  const { db, doc, updateDoc } = window._FB;
  // Actualizar UI local inmediatamente
  const idx = allCitas.findIndex(c => c.id === id);
  if (idx >= 0) { allCitas[idx].estado = estado; renderAll(); }
  toast(`Estado: ${estadoLabel(estado)}`);
  try {
    await updateDoc(doc(db, 'citas', id), { estado });
  } catch (e) {
    // Offline: Firestore sincroniza al reconectar, no hacer nada
  }
}

// ── MODAL ──
function openModal(citaData = null) {
  const isEdit = !!citaData;
  document.getElementById('modal-title').textContent = isEdit ? 'Editar cita' : 'Nueva cita';
  document.getElementById('f-id').value      = isEdit ? citaData.id      : '';
  document.getElementById('f-nombre').value  = isEdit ? citaData.nombre  : '';
  document.getElementById('f-tel').value     = isEdit ? citaData.telefono: '';
  document.getElementById('f-fecha').value   = isEdit ? citaData.fecha   : toISO(new Date());
  document.getElementById('f-hora').value    = isEdit ? citaData.hora    : '';
  document.getElementById('f-notas').value   = isEdit ? citaData.notas   : '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-nombre').focus(), 340);
}
function closeModal() {
  const el = document.getElementById('overlay');
  el.classList.remove('open');
  el.style.display = 'none';
  setTimeout(() => { el.style.display = ''; }, 300);
  ['f-id','f-nombre','f-tel','f-hora','f-notas'].forEach(i => {
    const inp = document.getElementById(i);
    if (inp) inp.value = '';
  });
  document.getElementById('f-fecha').value = toISO(new Date());
}
function handleOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function editCita(id) {
  const c = allCitas.find(x => x.id === id);
  if (c) openModal(c);
}

async function saveCita() {
  const { db, collection, doc, addDoc, updateDoc, serverTimestamp } = window._FB;
  const id     = document.getElementById('f-id').value;
  const nombre = document.getElementById('f-nombre').value.trim();
  const tel    = document.getElementById('f-tel').value.trim();
  const fecha  = document.getElementById('f-fecha').value;
  const hora   = document.getElementById('f-hora').value;
  const notas  = document.getElementById('f-notas').value.trim();

  if (!nombre || !fecha || !hora) {
    toast('⚠️ Nombre, fecha y hora son obligatorios'); return;
  }

  const data = { nombre, telefono: tel, fecha, hora, notas };

  // Cerrar modal inmediatamente sin esperar red
  closeModal();
  toast('Guardando...');

  // Timeout de 5s — si no responde (sin internet) igual confirma
  const timer = setTimeout(() => {
    toast(id ? '✅ Cita actualizada' : '✅ Cita guardada');
  }, 5000);

  try {
    if (id) {
      await updateDoc(doc(db, 'citas', id), data);
    } else {
      data.estado = 'pendiente';
      data.creado = serverTimestamp();
      await addDoc(collection(db, 'citas'), data);
    }
    clearTimeout(timer);
    toast(id ? '✅ Cita actualizada' : '✅ Cita guardada');
  } catch (e) {
    clearTimeout(timer);
    if (e.code === 'unavailable' || !navigator.onLine) {
      toast('✅ Guardado — se sincronizará al reconectar');
    } else {
      alert('ERROR:\nCódigo: ' + (e.code||'sin código') + '\n\n' + (e.message||'sin mensaje'));
    }
  }
}

function showDebugError(code, msg) {
  // Crear panel de error visible en pantalla
  let panel = document.getElementById('debug-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'debug-panel';
    panel.style.cssText = `
      position:fixed; bottom:80px; left:12px; right:12px; z-index:9999;
      background:#1e1e2e; color:#f8f8f2; border-radius:12px;
      padding:14px 16px; font-size:12px; font-family:monospace;
      box-shadow:0 4px 24px rgba(0,0,0,.5); max-height:200px; overflow-y:auto;
    `;
    document.body.appendChild(panel);
  }
  panel.innerHTML = `
    <div style="color:#ff5555;font-weight:700;margin-bottom:6px;">❌ Error al guardar</div>
    <div style="color:#ffb86c;">Código: ${code || 'desconocido'}</div>
    <div style="color:#f8f8f2;margin-top:4px;word-break:break-all;">${msg}</div>
    <button onclick="document.getElementById('debug-panel').remove()"
      style="margin-top:10px;background:#ff5555;border:none;color:white;
             padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;">
      Cerrar
    </button>
  `;
}

// ── DELETE ──
function askDelete(id, nombre) {
  deleteTarget = id;
  document.getElementById('confirm-msg').textContent =
    `¿Eliminar la cita de ${nombre}? Esta acción no se puede deshacer.`;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() {
  deleteTarget = null;
  const el = document.getElementById('confirm-overlay');
  el.classList.remove('open');
  el.style.display = 'none';
  setTimeout(() => { el.style.display = ''; }, 300);
}
async function confirmDelete() {
  if (!deleteTarget) return;
  const { db, doc, deleteDoc } = window._FB;
  const targetId = deleteTarget;

  // Cerrar modal inmediatamente sin esperar red
  closeConfirm();
  toast('Eliminando...');

  const timer = setTimeout(() => {
    toast('🗑️ Cita eliminada');
  }, 5000);

  try {
    await deleteDoc(doc(db, 'citas', targetId));
    clearTimeout(timer);
    toast('🗑️ Cita eliminada');
  } catch (e) {
    clearTimeout(timer);
    if (e.code === 'unavailable' || !navigator.onLine) {
      toast('🗑️ Eliminado — se sincronizará al reconectar');
    } else {
      toast('Error al eliminar: ' + (e.code||''));
    }
  }
}
</script>
</body>
</html>
